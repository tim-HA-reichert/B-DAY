<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistikk — Max 32</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="graph.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="page">
      <div class="page-header">
        <h1 class="page-title">statistikk <em>🎂</em></h1>
      </div>

      <div class="winners-row">
        <div class="winner-card">
          <div class="winner-label">🏆 Vinnende restaurant</div>
          <div class="winner-name">🌮 Amigos</div>
        </div>
        <div class="winner-card">
          <div class="winner-label">🏆 Vinnende film</div>
          <div class="winner-name">🎲 Jumanji</div>
        </div>
      </div>

      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-value" id="val-total">—</div>
          <div class="stat-card-label">Totalt svar</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="val-coming">—</div>
          <div class="stat-card-label">Kommer 🎉</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="val-mat">—</div>
          <div class="stat-card-label">På mat 🍝</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" id="val-kino">—</div>
          <div class="stat-card-label">På kino 🎬</div>
        </div>
      </div>

      <div class="charts-row">
        <div class="chart-box">
          <div class="chart-title">🍝 Restaurant</div>
          <canvas id="food-chart"></canvas>
        </div>
        <div class="chart-box">
          <div class="chart-title">🎬 Film</div>
          <canvas id="movie-chart"></canvas>
        </div>
      </div>

      <div class="correlation-banner">
        <div class="correlation-alert-tag">⚠️ ADVARSEL</div>
        <div class="correlation-title">OPPDAGET KORRELASJON:<br><em>AMIGOS + JUMANJI</em></div>
        <div class="correlation-sub">Vi oppdaget korrelasjon mellom å stemme Amigos og Jumanji</div>
      </div>

      <div class="guest-box">
        <div class="guest-box-title">Gjesteliste</div>
        <table class="guest-table">
          <thead>
            <tr>
              <th>Navn</th>
              <th>Mat</th>
              <th>Kino</th>
              <th>Restaurant</th>
              <th>Film</th>
            </tr>
          </thead>
          <tbody id="guest-tbody"></tbody>
        </table>
      </div>
    </div>
    <script src="graph_script.js"></script>
  </body>
</html>
